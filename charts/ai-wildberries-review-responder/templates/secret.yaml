{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wb-responder.secretName" . }}
  labels:
    {{- include "wb-responder.labels" . | nindent 4 }}
type: Opaque
stringData:
  WILDBERRIES__API_TOKEN: {{ required "secrets.wildberriesApiToken (or secrets.existingSecret) must be provided" .Values.secrets.wildberriesApiToken | quote }}
  {{- if .Values.secrets.llmApiKey }}
  LLM__API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  {{- end }}
{{- end -}}
